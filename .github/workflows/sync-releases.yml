name: Sync app release notes

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch InkLeaf latest release
        env:
          INKFRAME_INKLEAF_TOKEN: ${{ secrets.INKFRAME_INKLEAF_TOKEN }}
        run: |
          curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $INKFRAME_INKLEAF_TOKEN" \
            https://api.github.com/repos/ebrock/inkleaf/releases/latest \
            -o inkleaf/releases.json || echo '{}' > inkleaf/releases.json

      - name: Fetch InkFrame latest release
        env:
          INKFRAME_INKLEAF_TOKEN: ${{ secrets.INKFRAME_INKLEAF_TOKEN }}
        run: |
          curl -sf \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $INKFRAME_INKLEAF_TOKEN" \
            https://api.github.com/repos/ebrock/inkframe/releases/latest \
            -o inkframe/releases.json || echo '{}' > inkframe/releases.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inkleaf/releases.json inkframe/releases.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync app release notes"
            git push
          fi
